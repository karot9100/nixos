################
### MONITORS ###
################
#test

monitor=,1920x1080@60,auto,1


###################
### MY PROGRAMS ###
###################

$terminal = alacritty
$fileManager = nautilus
$menu = fuzzel
$browser = GTK_THEME=Adwaita:dark firefox
$musicplayer = supersonic
$email = thunderbird

#################
### AUTOSTART ###
#################

exec-once = nm-applet
exec-once = waybar & hyprpaper &
exec-once = swayosd-server -s /home/simon/.config/swayosd/style.css &
exec-once = /usr/bin/gnome-keyring-daemon --start --components=pkcs11,secrets,ssh,gpg
exec-once = hyprctl setcursor Bibata-Modern-Ice 24

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = XCURSOR_THEME,Bibata-Modern-Ice
env = MOZ_ENABLE_WAYLAND,1
env = AQ_DRM_DEVICES,/dev/dri/card1:/dev/dri/card0  # Intel iGPU for rendering


#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 5
    gaps_out = 5
    border_size = 1
    col.active_border = rgba(33ccffee)
    col.inactive_border = rgba(595959aa)
    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 5
    rounding_power = 2
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 3
        passes = 1
        vibrancy = 0.1696
    }
}

animations {
    enabled = yes, please :)

    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 1.94, almostLinear, fade
    animation = workspacesIn, 1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    animate_manual_resizes = true
    vfr = true
}

cursor {
    enable_hyprcursor = false
}


#############
### INPUT ###
#############

input {
    kb_layout = be
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1
    numlock_by_default = true
    sensitivity = 0.1

    touchpad {
        natural_scroll = true
        disable_while_typing = true
        tap-to-click = true
    }
}

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

$mainMod = SUPER

# Applications
bind = $mainMod, T, exec, $terminal
bind = $mainMod, V, exec, $fileManager
bind = $mainMod, B, exec, $browser
bind = $mainMod, E, exec, $email
bind = $mainMod, D, exec, $menu
bind = $mainMod, M, exec, $musicplayer
bind = $mainMod, R, exec, $terminal -e btop
bind = $mainMod, Y, exec, setsid chromium --app="http://youtube.com" --force-dark-mode --enable-features=WebUIDarkMode
bind = $mainMod, A, exec, setsid chromium --app="https://claude.ai" --force-dark-mode --enable-features=WebUIDarkMode
bind = $mainMod, W, exec, setsid chromium --app="http://web.whatsapp.com" --force-dark-mode --enable-features=WebUIDarkMode

# Window management
bind = $mainMod, Q, killactive,
bind = $mainMod, F, fullscreen
bind = $mainMod, SPACE, togglefloating,
bind = $mainMod, P, pseudo,
bind = $mainMod, J, togglesplit,
bind = $mainMod, L, exec, hyprlock

# Screenshots (grim + slurp)
bind = , Print, exec, grim -g "$(slurp)" ~/Screenshots/$(date +%Y%m%d_%H%M%S).png
bind = SHIFT, Print, exec, grim ~/Screenshots/$(date +%Y%m%d_%H%M%S).png
bind = $mainMod, Print, exec, grim -g "$(slurp -s '#00000000')" ~/Screenshots/$(date +%Y%m%d_%H%M%S).png

# System
bind = $mainMod, F4, exec, systemctl poweroff
bind = $mainMod, F3, exec, systemctl reboot
bind = $mainMod SHIFT, F3, exit,
bind = $mainMod SHIFT, R, exec, pkill waybar && waybar &

# Focus
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Workspaces (keycodes for BE keyboard layout)
bind = $mainMod, 10, workspace, 1
bind = $mainMod, 11, workspace, 2
bind = $mainMod, 12, workspace, 3
bind = $mainMod, 13, workspace, 4
bind = $mainMod, 14, workspace, 5
bind = $mainMod, 15, workspace, 6
bind = $mainMod, 16, workspace, 7
bind = $mainMod, 17, workspace, 8
bind = $mainMod, 18, workspace, 9
bind = $mainMod, 19, workspace, 10

bind = $mainMod SHIFT, 10, movetoworkspace, 1
bind = $mainMod SHIFT, 11, movetoworkspace, 2
bind = $mainMod SHIFT, 12, movetoworkspace, 3
bind = $mainMod SHIFT, 13, movetoworkspace, 4
bind = $mainMod SHIFT, 14, movetoworkspace, 5
bind = $mainMod SHIFT, 15, movetoworkspace, 6
bind = $mainMod SHIFT, 16, movetoworkspace, 7
bind = $mainMod SHIFT, 17, movetoworkspace, 8
bind = $mainMod SHIFT, 18, movetoworkspace, 9
bind = $mainMod SHIFT, 19, movetoworkspace, 10

# Mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Media keys
bindel = ,XF86AudioRaiseVolume, exec, swayosd-client --output-volume +10
bindel = ,XF86AudioLowerVolume, exec, swayosd-client --output-volume -10
bindel = ,XF86AudioMute, exec, swayosd-client --output-volume mute-toggle
bindel = ,XF86AudioMicMute, exec, swayosd-client --input-volume mute-toggle
bindel = ,XF86MonBrightnessUp, exec, swayosd-client --brightness raise
bindel = ,XF86MonBrightnessDown, exec, swayosd-client --brightness lower
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous


##############################
### WINDOWS AND WORKSPACES ###
##############################

windowrule = suppressevent maximize, class:.*
windowrule = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0

# Floating windows
windowrule = float, class:^(nm-connection-editor)$
windowrule = float, title:^(Open File)(.*)$
windowrule = float, title:^(Select a File)(.*)$
windowrule = float, title:^(Save As)(.*)$
